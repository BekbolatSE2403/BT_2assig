name: Smart Contract CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  test:
    name: Run Forge Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        solc: [0.8.24]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.foundry/cache
            lib/
          key: ${{ runner.os }}-foundry-${{ hashFiles('foundry.toml') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Install dependencies
        run: forge install

      - name: Build contracts
        run: forge build --sizes

      - name: Run unit tests
        run: forge test --match-contract MyTokenTest -vvv

      - name: Run fuzz tests
        run: forge test --match-contract MyTokenFuzzTest -vvv

      - name: Run invariant tests
        run: forge test --match-contract MyTokenInvariantTest -vvv

      - name: Run AMM tests
        run: forge test --match-contract AMMTest -vvv

      - name: Run AMM fuzz tests
        run: forge test --match-contract AMMFuzzTest -vvv

      - name: Run lending pool tests
        run: forge test --match-contract LendingPoolTest -vvv

      # Fork tests with secret
      - name: Run fork tests
        run: forge test --match-contract MainnetForkTest -vvv
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Generate gas report
        run: forge test --gas-report | tee gas-report.txt || true

      - name: Generate coverage report
        run: |
          forge coverage --report lcov || true
          forge coverage --report summary | tee coverage-summary.txt || true

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt
          if-no-files-found: warn

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-summary.txt
          if-no-files-found: warn

  slither:
    name: Run Slither Static Analysis
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Run Slither
        uses: crytic/slither-action@v0.3.0
        with:
          target: src/
          fail-on: medium
          slither-args: --filter-paths "lib/"
        continue-on-error: true

  format:
    name: Check Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check formatting
        run: forge fmt --check

  size:
    name: Check Contract Sizes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build and check sizes
        run: forge build --sizes

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, slither, format, size]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit & Fuzz Tests | ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Slither Analysis | ${{ needs.slither.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Code Format | ${{ needs.format.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Sizes | ${{ needs.size.result }}" >> $GITHUB_STEP_SUMMARY